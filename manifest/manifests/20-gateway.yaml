apiVersion: apps/v1
kind: Deployment
metadata: { name: gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - { name: html, mountPath: /usr/share/nginx/html/index.html, subPath: index.html }
            - { name: conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - { name: html, configMap: { name: lab4-ui } }
        - { name: conf, configMap: { name: lab4-nginx-conf } }
---
apiVersion: v1
kind: Service
metadata: { name: gateway-svc }
spec:
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 80 }]
---

