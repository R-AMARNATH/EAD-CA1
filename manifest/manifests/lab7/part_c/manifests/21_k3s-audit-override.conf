[Service]
ExecStart=
ExecStart=/usr/local/bin/k3s server \
  --kube-apiserver-arg=audit-log-path=/var/lib/rancher/k3s/server/logs/kube-audit.log \
  --kube-apiserver-arg=audit-policy-file=/etc/rancher/k3s/audit-policy.yaml \
  --kube-apiserver-arg=audit-log-maxage=2 \
  --kube-apiserver-arg=audit-log-maxbackup=2 \
  --kube-apiserver-arg=audit-log-maxsize=100
